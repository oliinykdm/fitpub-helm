name: Kind Runtime Test

on:
  workflow_dispatch:
  schedule:
    - cron: '20 3 * * 1'
  push:
    branches: [ main ]
    paths:
      - 'charts/**'
      - 'examples/**'
      - '.github/workflows/runtime-smoke-test.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'charts/**'
      - 'examples/**'
      - '.github/workflows/runtime-smoke-test.yaml'

concurrency:
  group: kind-runtime-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0

      - name: Verify kind cluster is reachable
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide
          kubectl wait --for=condition=ready node --all --timeout=120s

      - name: Install PostGIS
        run: |
          kubectl apply -f examples/postgis-dev.yaml
          kubectl rollout status deployment/postgis --timeout=180s
          kubectl wait --for=condition=available deployment/postgis --timeout=180s

      - name: Create FitPub secret
        run: |
          kubectl create secret generic fitpub-secret \
            --from-literal=FITPUB_DATABASE_USERNAME=fitpub \
            --from-literal=FITPUB_DATABASE_PASSWORD=fitpub \
            --from-literal=FITPUB_JWT_SECRET=test-jwt-secret-with-more-than-32-characters \
            --from-literal=FITPUB_EMAIL_SECRET=test-email-secret-with-more-than-32-characters

      - name: Verify PostGIS accepts smoke-test credentials
        run: |
          kubectl run postgis-credential-check \
            --image=postgres:16-alpine \
            --restart=Never \
            --rm \
            -i \
            --env=PGPASSWORD=fitpub \
            --command -- psql -h postgis -U fitpub -d fitpub -c 'SELECT 1'

      - name: Install FitPub chart and wait for rollout
        run: |
          set -euo pipefail
          if ! helm upgrade --install fitpub ./charts/fitpub \
            -f examples/runtime-smoke-values.yaml \
            --wait \
            --timeout 10m; then
            echo "Helm install did not become ready — collecting diagnostics:"
            kubectl get pods -o wide
            kubectl describe deployment/fitpub || true
            kubectl describe pod -l app.kubernetes.io/instance=fitpub || true
            kubectl logs -l app.kubernetes.io/instance=fitpub --tail=200 || true
            exit 1
          fi

      - name: Verify FitPub pod readiness and probe success
        run: |
          kubectl get pods -l app.kubernetes.io/instance=fitpub -o wide
          kubectl rollout status deployment/fitpub --timeout=600s
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/instance=fitpub \
            --timeout=600s

          ready="$(kubectl get pod -l app.kubernetes.io/instance=fitpub \
            -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}')"
          if [ "$ready" != "True" ]; then
            echo "Expected pod Ready=True, got: $ready"
            kubectl describe pod -l app.kubernetes.io/instance=fitpub
            exit 1
          fi

          restarts="$(kubectl get pod -l app.kubernetes.io/instance=fitpub \
            -o jsonpath='{.items[0].status.containerStatuses[0].restartCount}')"
          if [ "$restarts" != "0" ]; then
            echo "Pod restarted during startup (restartCount=$restarts)"
            kubectl logs -l app.kubernetes.io/instance=fitpub --tail=200
            exit 1
          fi

      - name: Check FitPub serves /login inside the cluster
        run: |
          kubectl run fitpub-login-check \
            --image=curlimages/curl:8.11.1 \
            --restart=Never \
            --rm \
            -i \
            --command -- curl -fsS -o /dev/null -w 'HTTP:%{http_code}\n' http://fitpub:8080/login

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get all
          kubectl describe deployment/fitpub || true
          kubectl describe pod -l app.kubernetes.io/instance=fitpub || true
          kubectl logs -l app.kubernetes.io/instance=fitpub --all-containers=true --tail=200 || true
          kubectl describe deployment/postgis || true
          kubectl logs -l app=postgis --all-containers=true --tail=200 || true

  kind-networkpolicy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0

      - name: Install PostGIS
        run: |
          kubectl apply -f examples/postgis-dev.yaml
          kubectl rollout status deployment/postgis --timeout=180s
          kubectl wait --for=condition=available deployment/postgis --timeout=180s

      - name: Create FitPub secret
        run: |
          kubectl create secret generic fitpub-secret \
            --from-literal=FITPUB_DATABASE_USERNAME=fitpub \
            --from-literal=FITPUB_DATABASE_PASSWORD=fitpub \
            --from-literal=FITPUB_JWT_SECRET=test-jwt-secret-with-more-than-32-characters \
            --from-literal=FITPUB_EMAIL_SECRET=test-email-secret-with-more-than-32-characters

      - name: Verify PostGIS accepts smoke-test credentials
        run: |
          kubectl run postgis-credential-check \
            --image=postgres:16-alpine \
            --restart=Never \
            --rm \
            -i \
            --env=PGPASSWORD=fitpub \
            --command -- psql -h postgis -U fitpub -d fitpub -c 'SELECT 1'

      - name: Install FitPub with restricted NetworkPolicy
        run: |
          set -euo pipefail
          if ! helm upgrade --install fitpub ./charts/fitpub \
            -f examples/networkpolicy-smoke-values.yaml \
            --wait \
            --timeout 10m; then
            echo "Helm install did not become ready — collecting diagnostics:"
            kubectl get pods -o wide
            kubectl get networkpolicy || true
            kubectl describe deployment/fitpub || true
            kubectl describe pod -l app.kubernetes.io/instance=fitpub || true
            kubectl logs -l app.kubernetes.io/instance=fitpub --tail=200 || true
            exit 1
          fi

      - name: Verify FitPub pod readiness under NetworkPolicy
        run: |
          kubectl get networkpolicy -l app.kubernetes.io/instance=fitpub
          kubectl rollout status deployment/fitpub --timeout=600s
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/instance=fitpub \
            --timeout=600s

      - name: Check FitPub serves /login inside the cluster
        run: |
          kubectl run fitpub-login-check-np \
            --image=curlimages/curl:8.11.1 \
            --restart=Never \
            --rm \
            -i \
            --command -- curl -fsS -o /dev/null -w 'HTTP:%{http_code}\n' http://fitpub:8080/login

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get all
          kubectl get networkpolicy
          kubectl describe deployment/fitpub || true
          kubectl describe pod -l app.kubernetes.io/instance=fitpub || true
          kubectl logs -l app.kubernetes.io/instance=fitpub --all-containers=true --tail=200 || true
