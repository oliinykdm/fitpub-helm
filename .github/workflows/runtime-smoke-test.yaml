name: Runtime Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: '20 3 * * 1'

jobs:
  runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0

      - name: Create FitPub secret
        run: |
          kubectl create secret generic fitpub-secret \
            --from-literal=FITPUB_DATABASE_USERNAME=fitpub \
            --from-literal=FITPUB_DATABASE_PASSWORD=fitpub-password \
            --from-literal=FITPUB_JWT_SECRET=test-jwt-secret-with-more-than-32-characters \
            --from-literal=FITPUB_EMAIL_SECRET=test-email-secret-with-more-than-32-characters

      - name: Install PostGIS
        run: |
          kubectl create secret generic postgis-secret \
            --from-literal=POSTGRES_DB=fitpub \
            --from-literal=POSTGRES_USER=fitpub \
            --from-literal=POSTGRES_PASSWORD=fitpub-password

          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: Service
          metadata:
            name: postgis
          spec:
            ports:
              - name: postgres
                port: 5432
                targetPort: postgres
            selector:
              app.kubernetes.io/name: postgis
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgis
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: postgis
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: postgis
              spec:
                containers:
                  - name: postgis
                    image: postgis/postgis:16-3.4
                    imagePullPolicy: IfNotPresent
                    ports:
                      - name: postgres
                        containerPort: 5432
                    envFrom:
                      - secretRef:
                          name: postgis-secret
                    readinessProbe:
                      exec:
                        command:
                          - sh
                          - -c
                          - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                      periodSeconds: 5
                      timeoutSeconds: 5
                      failureThreshold: 12
          EOF

          kubectl rollout status deployment/postgis --timeout=180s

      - name: Install FitPub chart
        run: |
          helm install fitpub ./charts/fitpub \
            -f examples/runtime-smoke-values.yaml \
            --wait \
            --timeout 10m

      - name: Check FitPub health endpoint
        run: |
          kubectl run fitpub-healthcheck \
            --image=curlimages/curl:8.11.1 \
            --restart=Never \
            --rm \
            -i \
            --command -- curl -fsS http://fitpub:8080/actuator/health

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get all
          kubectl describe deployment/fitpub || true
          kubectl describe pod -l app.kubernetes.io/name=fitpub || true
          kubectl logs -l app.kubernetes.io/name=fitpub --all-containers=true --tail=200 || true
          kubectl describe deployment/postgis || true
          kubectl logs -l app.kubernetes.io/name=postgis --all-containers=true --tail=200 || true
