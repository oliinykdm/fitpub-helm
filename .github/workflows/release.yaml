name: Release Helm Chart

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - 'artifacthub-repo.yml'
      - 'pgp-public-key.asc'
      - '.github/workflows/release.yaml'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: helm-chart-release
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up cosign
        uses: sigstore/cosign-installer@v3

      - name: Prepare GPG signing key
        run: |
          test -n "${{ secrets.GPG_KEYRING_BASE64 }}"
          test -n "${{ secrets.GPG_PASSPHRASE }}"

          mkdir -p "$HOME/.gnupg"
          chmod 700 "$HOME/.gnupg"

          echo "${{ secrets.GPG_KEYRING_BASE64 }}" | base64 --decode > "$HOME/.gnupg/secring.gpg"
          printf '%s' "${{ secrets.GPG_PASSPHRASE }}" > "$HOME/.gnupg/passphrase"
          chmod 600 "$HOME/.gnupg/secring.gpg" "$HOME/.gnupg/passphrase"

      - name: Ensure GitHub Pages branch exists
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
            exit 0
          fi

          current_revision="$(git rev-parse HEAD)"
          git switch --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          printf 'apiVersion: v1\nentries: {}\n' > index.yaml
          touch .nojekyll
          git add index.yaml .nojekyll
          git commit -m "Initialize Helm chart repository"
          git push origin gh-pages
          git checkout "$current_revision"

      - name: Package and sign charts
        run: |
          rm -rf .deploy && mkdir -p .deploy
          for chart in charts/*/; do
            helm package "$chart" \
              --sign \
              --key "FitPub Helm Chart Release" \
              --keyring "$HOME/.gnupg/secring.gpg" \
              --passphrase-file "$HOME/.gnupg/passphrase" \
              --destination .deploy
          done

      - name: Publish to GHCR and sign with cosign
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          for pkg in .deploy/*.tgz; do
            name="$(helm show chart "$pkg" | awk '/^name:/{print $2}')"
            # helm push prints the pushed digest to stderr; capture it for cosign.
            helm push "$pkg" "oci://ghcr.io/${owner}/charts" 2>&1 | tee push.log
            digest="$(awk '/Digest: /{print $2}' push.log)"
            cosign sign --yes "ghcr.io/${owner}/charts/${name}@${digest}"
          done

      - name: Publish to GitHub Pages
        run: |
          repo_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"

          worktree="$(mktemp -d)"
          git fetch origin gh-pages
          git worktree add "$worktree" origin/gh-pages

          # Re-index only the freshly built packages and merge them into the
          # published index so existing release dates are left untouched.
          helm repo index .deploy --url "$repo_url" --merge "$worktree/index.yaml"

          cp .deploy/*.tgz "$worktree"/
          cp .deploy/*.tgz.prov "$worktree"/ 2>/dev/null || true
          cp .deploy/index.yaml "$worktree/index.yaml"
          cp artifacthub-repo.yml "$worktree/artifacthub-repo.yml"
          cp pgp-public-key.asc "$worktree/pgp-public-key.asc"
          touch "$worktree/.nojekyll"

          cd "$worktree"
          if [ -z "$(git status --porcelain)" ]; then
            echo "Nothing new to publish"
            exit 0
          fi

          git add -A
          git commit -m "Publish chart packages to GitHub Pages"
          git push origin HEAD:gh-pages

      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          for chart in charts/*/; do
            name="$(helm show chart "$chart" | awk '/^name:/{print $2}')"
            version="$(helm show chart "$chart" | awk '/^version:/{print $2}')"
            tag="${name}-${version}"
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release ${tag} already exists, skipping"
              continue
            fi
            # Build release notes: install command plus the chart changelog
            # from the artifacthub.io/changes annotation in Chart.yaml.
            {
              echo "## Install"
              echo
              echo '```bash'
              echo "helm install ${name} oci://ghcr.io/${owner}/charts/${name} --version ${version}"
              echo '```'
              echo
              echo "## Changes"
              echo
              helm show chart "$chart" \
                | yq '.annotations."artifacthub.io/changes"' \
                | yq '.[] | "- **" + .kind + "**: " + .description'
            } > release-notes.md
            # gh release create tags the commit if the tag does not exist yet.
            gh release create "$tag" .deploy/${name}-${version}.tgz* \
              --target "${GITHUB_SHA}" \
              --title "$tag" \
              --notes-file release-notes.md
          done
