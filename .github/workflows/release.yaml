name: Release Helm Chart

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - 'artifacthub-repo.yml'
      - 'cr.yaml'
      - 'pgp-public-key.asc'
      - '.github/scripts/prune-helm-index.rb'
      - '.github/workflows/release.yaml'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: helm-chart-release
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Prepare GPG signing key
        run: |
          test -n "${{ secrets.GPG_KEYRING_BASE64 }}"
          test -n "${{ secrets.GPG_KEY_NAME }}"
          test -n "${{ secrets.GPG_PASSPHRASE }}"

          mkdir -p "$HOME/.gnupg"
          chmod 700 "$HOME/.gnupg"

          echo "${{ secrets.GPG_KEYRING_BASE64 }}" | base64 --decode > "$HOME/.gnupg/secring.gpg"
          printf '%s' "${{ secrets.GPG_PASSPHRASE }}" > "$HOME/.gnupg/passphrase"
          chmod 600 "$HOME/.gnupg/secring.gpg" "$HOME/.gnupg/passphrase"

          if [ "${{ secrets.GPG_KEY_NAME }}" != "FitPub Helm Chart Release" ]; then
            echo "GPG_KEY_NAME must match the Helm signing key UID used in cr.yaml"
            exit 1
          fi

      - name: Ensure GitHub Pages branch exists
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
            echo "gh-pages branch already exists"
            exit 0
          fi

          current_revision="$(git rev-parse HEAD)"
          git switch --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          printf 'apiVersion: v1\nentries: {}\n' > index.yaml
          touch .nojekyll
          git add index.yaml .nojekyll
          git commit -m "Initialize Helm chart repository"
          git push origin gh-pages
          git checkout "$current_revision"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          config: cr.yaml
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish Artifact Hub metadata
        run: |
          if [ ! -f artifacthub-repo.yml ]; then
            echo "artifacthub-repo.yml not found, skipping"
            exit 0
          fi

          worktree="$(mktemp -d)"
          git fetch origin gh-pages
          git worktree add "$worktree" origin/gh-pages
          cp artifacthub-repo.yml "$worktree/artifacthub-repo.yml"
          cp pgp-public-key.asc "$worktree/pgp-public-key.asc"
          touch "$worktree/.nojekyll"

          cd "$worktree"
          if [ -z "$(git status --porcelain -- artifacthub-repo.yml pgp-public-key.asc .nojekyll)" ]; then
            echo "Artifact Hub metadata is already up to date"
            exit 0
          fi

          git add artifacthub-repo.yml pgp-public-key.asc .nojekyll
          git commit -m "Update Helm repository metadata"
          git push origin HEAD:gh-pages

      - name: Prune missing chart packages from index
        run: |
          worktree="$(mktemp -d)"
          git fetch origin gh-pages
          git worktree add "$worktree" origin/gh-pages

          ruby .github/scripts/prune-helm-index.rb "$worktree/index.yaml"

          cd "$worktree"
          if [ -z "$(git status --porcelain -- index.yaml)" ]; then
            echo "index.yaml does not contain stale chart package entries"
            exit 0
          fi

          git add index.yaml
          git commit -m "Prune missing chart packages from index"
          git push origin HEAD:gh-pages
