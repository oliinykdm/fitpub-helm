name: Release Helm Chart

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - 'artifacthub-repo.yml'
      - '.github/workflows/release.yaml'

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: helm-chart-release
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Ensure GitHub Pages branch exists
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
            echo "gh-pages branch already exists"
            exit 0
          fi

          current_revision="$(git rev-parse HEAD)"
          git switch --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          printf 'apiVersion: v1\nentries: {}\n' > index.yaml
          touch .nojekyll
          git add index.yaml .nojekyll
          git commit -m "Initialize Helm chart repository"
          git push origin gh-pages
          git checkout "$current_revision"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish Artifact Hub metadata
        run: |
          if [ ! -f artifacthub-repo.yml ]; then
            echo "artifacthub-repo.yml not found, skipping"
            exit 0
          fi

          worktree="$(mktemp -d)"
          git fetch origin gh-pages
          git worktree add "$worktree" origin/gh-pages
          cp artifacthub-repo.yml "$worktree/artifacthub-repo.yml"
          touch "$worktree/.nojekyll"

          cd "$worktree"
          if [ -z "$(git status --porcelain -- artifacthub-repo.yml .nojekyll)" ]; then
            echo "Artifact Hub metadata is already up to date"
            exit 0
          fi

          git add artifacthub-repo.yml .nojekyll
          git commit -m "Update Helm repository metadata"
          git push origin HEAD:gh-pages
