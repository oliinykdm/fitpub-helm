name: Lint and Test Helm Chart

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing (lint)
        run: ct lint --target-branch main --chart-dirs charts

      - name: Render chart templates
        run: helm template fitpub ./charts/fitpub

      - name: Render production example
        run: helm template fitpub ./charts/fitpub -f examples/production-values.yaml

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0

      - name: Validate manifests against Kubernetes API
        run: |
          kubectl create secret generic fitpub-secret \
            --from-literal=FITPUB_DATABASE_USERNAME=fitpub \
            --from-literal=FITPUB_DATABASE_PASSWORD=test-password \
            --from-literal=FITPUB_JWT_SECRET=test-jwt-secret-with-more-than-32-characters \
            --from-literal=FITPUB_EMAIL_SECRET=test-email-secret-with-more-than-32-characters \
            --dry-run=client -o yaml | kubectl apply -f -

          helm template fitpub ./charts/fitpub \
            -f examples/production-values.yaml \
            --set ingress.enabled=false \
            --set podDisruptionBudget.enabled=false \
            | kubectl apply --dry-run=server -f -
