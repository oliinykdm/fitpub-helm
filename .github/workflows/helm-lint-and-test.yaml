name: Lint and Test Helm Chart

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'charts/**'
      - 'examples/**'
      - 'docs/**'
      - 'README.md'
      - 'artifacthub-repo.yml'
      - 'pgp-public-key.asc'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/helm-lint-and-test.yaml'
      - '.github/workflows/runtime-smoke-test.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'charts/**'
      - 'examples/**'
      - 'docs/**'
      - 'README.md'
      - 'artifacthub-repo.yml'
      - 'pgp-public-key.asc'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/helm-lint-and-test.yaml'
      - '.github/workflows/runtime-smoke-test.yaml'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing (lint)
        run: ct lint --target-branch main --chart-dirs charts

      - name: Render chart templates
        run: helm template fitpub ./charts/fitpub

      - name: Render production example
        run: helm template fitpub ./charts/fitpub -f examples/production-values.yaml

      - name: Render networkpolicy smoke example
        run: helm template fitpub ./charts/fitpub -f examples/networkpolicy-smoke-values.yaml

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0

      - name: Validate manifests against Kubernetes API
        run: |
          kubectl create secret generic fitpub-secret \
            --from-literal=FITPUB_DATABASE_USERNAME=fitpub \
            --from-literal=FITPUB_DATABASE_PASSWORD=test-password \
            --from-literal=FITPUB_JWT_SECRET=test-jwt-secret-with-more-than-32-characters \
            --from-literal=FITPUB_EMAIL_SECRET=test-email-secret-with-more-than-32-characters \
            --dry-run=client -o yaml | kubectl apply -f -

          # Validate the full production manifest set, including Ingress
          # (networking.k8s.io/v1) and PodDisruptionBudget (policy/v1), against
          # the API server. A non-existent IngressClass is not rejected at
          # admission, so this is safe on a bare kind cluster.
          helm template fitpub ./charts/fitpub \
            -f examples/production-values.yaml \
            | kubectl apply --dry-run=server -f -
