apiVersion: v2
name: fitpub
description: Helm chart for FitPub - federated fitness tracking platform
type: application
version: 0.2.5
appVersion: "1.1.1"
kubeVersion: ">= 1.26.0"
home: https://codeberg.org/fitpub/fitpub
sources:
  - https://codeberg.org/fitpub/fitpub
icon: https://raw.githubusercontent.com/oliinykdm/fitpub-helm/main/icon.png
keywords:
  - fitness
  - activitypub
  - spring-boot
  - postgresql
maintainers:
  - name: Dmytro Oliinyk
    url: https://github.com/oliinykdm
annotations:
  artifacthub.io/category: skip-prediction
  artifacthub.io/license: Apache-2.0
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/images: |
    - name: fitpub
      image: codeberg.org/fitpub/fitpub:1.1.1
    - name: volume-permissions
      image: busybox:1.37
      whitelisted: true
  artifacthub.io/signKey: |
    fingerprint: E4C86577339895552E1CAB5E49BD9E5EA6C243B7
    url: https://oliinykdm.github.io/fitpub-helm/pgp-public-key.asc
  artifacthub.io/changes: |
    - kind: fixed
      description: Init container now reads runAsUser/fsGroup from podSecurityContext instead of hardcoding 1001.
    - kind: fixed
      description: Secret no longer renders empty-string values; empty credentials no longer override optional features.
    - kind: changed
      description: serviceAccount.automount now defaults to false; FitPub does not need Kubernetes API access.
    - kind: changed
      description: Probe initialDelaySeconds removed from readinessProbe and livenessProbe; startupProbe already gates the startup window.
    - kind: changed
      description: podDisruptionBudget now supports maxUnavailable in addition to minAvailable; default changed to maxUnavailable=1.
    - kind: fixed
      description: Init container security context now includes allowPrivilegeEscalation=false and minimal capability set.
