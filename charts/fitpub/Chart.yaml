home: https://codeberg.org/fitpub/fitpub
sources:
  - https://codeberg.org/fitpub/fitpub
icon: https://raw.githubusercontent.com/oliinykdm/fitpub-helm/main/icon.png
keywords:
  - fitness
  - activitypub
  - spring-boot
