  artifacthub.io/changes: |
    - kind: changed
      description: "Trim default config to the keys the chart actually sets; the app supplies its own defaults for the rest."
    - kind: removed
      description: "Inline-secret placeholder-string checks (minimum-length checks for JWT/email secrets are retained)."
    - kind: changed
      description: "CI now validates Ingress and PodDisruptionBudget against the Kubernetes API server."
    - kind: changed
      description: "Factor the metadata annotations block into a shared template helper; rendered output is unchanged."
    - kind: changed
      description: "Examples no longer pin image.tag; it defaults to the chart appVersion."
