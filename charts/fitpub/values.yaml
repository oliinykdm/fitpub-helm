replicaCount: 1

image:
  repository: codeberg.org/fitpub/fitpub
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 1536Mi
  limits:
    memory: 2048Mi

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

config:
  # === Database ===
  FITPUB_DATABASE_URL: "jdbc:postgresql://postgres:5432/fitpub"
  FITPUB_DATABASE_USERNAME: "fitpub"
  FITPUB_DATABASE_PASSWORD: "change-me"

  # === Application ===
  SPRING_PROFILES_ACTIVE: "prod"
  FITPUB_PORT: "8080"
  FITPUB_DOMAIN: "example.fit"
  FITPUB_BASE_URL: "https://example.fit"

  # === Security ===
  FITPUB_JWT_SECRET: "change-me-super-secret"
  FITPUB_JWT_EXPIRATION_MS: "86400000"

  # === Flyway ===
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
  SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "true"

  # === Push Notifications (VAPID) ===
  FITPUB_PUSH_ENABLED: "true"
  FITPUB_VAPID_PUBLIC_KEY: "change-me"
  FITPUB_VAPID_PRIVATE_KEY: "change-me"
  FITPUB_VAPID_SUBJECT: "https://example.fit/"

  # === Email ===
  FITPUB_EMAIL_SECRET: "change-me"
  FITPUB_MAIL_HOST: "smtp.example.com"
  FITPUB_MAIL_PORT: "587"
  FITPUB_MAIL_SMTP_AUTH: "true"
  FITPUB_MAIL_STARTTLS_ENABLE: "true"
  FITPUB_MAIL_STARTTLS_REQUIRED: "true"
  FITPUB_MAIL_USERNAME: "user@example.com"
  FITPUB_MAIL_PASSWORD: "change-me"
  FITPUB_MAIL_FROM_ADDRESS: "noreply@example.fit"
