# Default values for the fitpub chart.
# See README.md and docs/ for the longer explanations.

replicaCount: 1
revisionHistoryLimit: 10

# Only matters with the RollingUpdate strategy.
minReadySeconds: 0

# RWO volume + single replica -> Recreate, otherwise the new pod can't mount.
deploymentStrategy:
  type: Recreate

# Applied to every object the chart renders.
commonLabels: {}
#   environment: production
#   team: platform
commonAnnotations: {}
#   reloader.stakater.com/auto: "true"

# Swap the container command for `sleep infinity` so a crashlooping pod can be
# exec'd into. Toggle with --set diagnosticMode.enabled=true --reuse-values.
diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity

image:
  repository: codeberg.org/fitpub/fitpub
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion when left empty.
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # FitPub never talks to the API server, so don't mount a token.
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # Can't be true: the app writes uploads, logs and JVM temp files to disk.
  readOnlyRootFilesystem: false

initContainers:
  volumePermissions:
    enabled: true
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  annotations: {}
  labels: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fitpub.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 1536Mi
  limits:
    memory: 2048Mi

persistence:
  enabled: true
  # "" -> default StorageClass, "-" -> no class (pre-bound PV), "name" -> that class.
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  # Set helm.sh/resource-policy: keep here to survive `helm uninstall`.
  annotations: {}
  existingClaim: ""
  # Keep in sync with config.FILE_UPLOAD_DIR (validated below).
  mountPath: /app/uploads

# Static Markdown pages (terms.md, imprint.md, optional about.md) from a Secret.
pages:
  existingSecret: ""
  mountPath: /app/pages
  readOnly: true

# Non-secret env, rendered into a ConfigMap and loaded via envFrom.
config:
  # Database
  FITPUB_DATABASE_URL: ""
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"

  # App
  SPRING_PROFILES_ACTIVE: "prod"
  FITPUB_PORT: "8080"
  FITPUB_DOMAIN: ""
  FITPUB_BASE_URL: ""
  FITPUB_SITE_BANNER_TEXT: ""

  # Security & federation
  FITPUB_SECURITY_JWT_EXPIRATION: "86400000"
  FITPUB_ACTIVITYPUB_ENABLED: "true"
  # http is for local federation testing only.
  FITPUB_FEDERATION_PROTOCOL: "https"
  # true allows federation calls to private IPs (SSRF risk) - dev only.
  FITPUB_ALLOW_PRIVATE_IPS: "false"

  # Flyway
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
  SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "true"

  # Web push (VAPID keys go in applicationSecret)
  FITPUB_PUSH_ENABLED: "true"
  FITPUB_VAPID_SUBJECT: ""

  # Mail
  FITPUB_MAIL_HOST: ""
  FITPUB_MAIL_PORT: "587"
  FITPUB_MAIL_SMTP_AUTH: "true"
  FITPUB_MAIL_STARTTLS_ENABLE: "true"
  FITPUB_MAIL_STARTTLS_REQUIRED: "true"
  FITPUB_MAIL_FROM_ADDRESS: ""
  FITPUB_MAIL_FROM_NAME: "FitPub"

  # Uploads - standard Spring multipart limits, keep request >= file.
  SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: "50MB"
  SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: "50MB"
  FILE_UPLOAD_DIR: "/app/uploads"
  FITPUB_PAGES_PATH: "/app/pages"

  FITPUB_REGISTRATION_ENABLED: "true"

  # Logging - app code lives under net.javahippie.fitpub.
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_NET_JAVAHIPPIE_FITPUB: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: "INFO"
  LOGGING_LEVEL_ORG_HIBERNATE: "WARN"
  LOGGING_LEVEL_ORG_FLYWAYDB: "INFO"
  FITPUB_LOG_DATE_PATTERN: "yyyy-MM-dd"
  FITPUB_LOG_MAX_FILE_SIZE: "100MB"
  FITPUB_LOG_MAX_HISTORY: "7"

# Either point existingSecret at a pre-created Secret, or fill in data below.
applicationSecret:
  existingSecret: ""
  data:
    FITPUB_DATABASE_USERNAME: ""
    FITPUB_DATABASE_PASSWORD: ""
    FITPUB_JWT_SECRET: ""
    FITPUB_EMAIL_SECRET: ""
    FITPUB_REGISTRATION_PASSWORD: ""
    FITPUB_VAPID_PUBLIC_KEY: ""
    FITPUB_VAPID_PRIVATE_KEY: ""
    FITPUB_MAIL_USERNAME: ""
    FITPUB_MAIL_PASSWORD: ""

# Override entrypoint/args only if you know why (e.g. custom JVM flags).
command: []
args: []

# preStop sleep gives the LB time to drain before SIGTERM, etc.
lifecycleHooks: {}
#   preStop:
#     exec:
#       command: ["sh", "-c", "sleep 5"]

extraEnv: []
extraEnvFrom: []
extraInitContainers: []
sidecars: []

# Off by default so `helm lint`/template work without real secrets.
# Turn on in prod values to fail fast on missing required settings.
productionChecks:
  enabled: false

# startupProbe guards the JVM warmup; readiness/liveness start only after it
# passes, so don't add initialDelaySeconds to those two.
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /actuator/health
    port: http
  # ~135s budget for startup (15 + 12*10).
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

# Off by default - uploads/background work aren't verified for multi-pod yet.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""

podDisruptionBudget:
  enabled: false
  # maxUnavailable suits single replica; minAvailable:1 would block node drains.
  # Set exactly one of the two.
  minAvailable: ""
  maxUnavailable: 1

# Off by default: FitPub needs egress to PostGIS, SMTP and federated hosts.
networkPolicy:
  enabled: false
  ingress:
    enabled: true
    extraRules: []
  egress:
    allowAll: true
    extraRules: []

serviceMonitor:
  enabled: false
  labels: {}
  annotations: {}
  interval: 30s
  scrapeTimeout: 10s
  # The prod profile exposes only health,info,metrics. To use this path also add
  # prometheus to MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE and ship the
  # micrometer-registry-prometheus dependency.
  path: /actuator/prometheus
  scheme: http

terminationGracePeriodSeconds: 60

priorityClassName: ""
schedulerName: ""
runtimeClassName: ""

hostAliases: []
#   - ip: "192.168.1.10"
#     hostnames:
#       - "other-fitpub.internal"

# ClusterFirst | ClusterFirstWithHostNet | Default | None ("" = cluster default).
dnsPolicy: ""
dnsConfig: {}
#   nameservers:
#     - 1.1.1.1

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
volumes: []
volumeMounts: []
