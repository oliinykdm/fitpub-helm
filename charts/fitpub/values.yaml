# =============================================================================
# Fitpub Helm Chart - Default Values
# =============================================================================

replicaCount: 1

revisionHistoryLimit: 10

deploymentStrategy:
  type: Recreate

image:
  # Container image for Fitpub
  repository: codeberg.org/fitpub/fitpub
  pullPolicy: IfNotPresent
  # Overrides the image tag (defaults to Chart appVersion)
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

initContainers:
  volumePermissions:
    enabled: true
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fitpub.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 1536Mi
  limits:
    memory: 2048Mi

# =============================================================================
# Persistent Storage
# =============================================================================
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  annotations: {}
  existingClaim: ""

pages:
  # Mount Markdown legal/about pages from an existing Secret.
  # The Secret should contain files such as terms.md, imprint.md and optional about.md.
  existingSecret: ""
  mountPath: /app/pages
  readOnly: true

# =============================================================================
# Application Configuration
# =============================================================================
# Non-secret values in this section are injected through a ConfigMap.
config:
  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  FITPUB_DATABASE_URL: ""
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"

  # ---------------------------------------------------------------------------
  # Application Settings
  # ---------------------------------------------------------------------------
  SPRING_PROFILES_ACTIVE: "prod"
  FITPUB_PORT: "8080"
  FITPUB_DOMAIN: ""
  FITPUB_BASE_URL: ""
  FITPUB_SITE_BANNER_TEXT: ""

  # ---------------------------------------------------------------------------
  # Security
  # ---------------------------------------------------------------------------
  FITPUB_JWT_EXPIRATION_MS: "86400000"
  FITPUB_ACTIVITYPUB_ENABLED: "true"

  # ---------------------------------------------------------------------------
  # Database Migrations (Flyway)
  # ---------------------------------------------------------------------------
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
  SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "true"

  # ---------------------------------------------------------------------------
  # Push Notifications (VAPID)
  # ---------------------------------------------------------------------------
  FITPUB_PUSH_ENABLED: "true"
  FITPUB_VAPID_SUBJECT: ""

  # ---------------------------------------------------------------------------
  # Email Settings
  # ---------------------------------------------------------------------------
  FITPUB_MAIL_HOST: ""
  FITPUB_MAIL_PORT: "587"
  FITPUB_MAIL_SMTP_AUTH: "true"
  FITPUB_MAIL_STARTTLS_ENABLE: "true"
  FITPUB_MAIL_STARTTLS_REQUIRED: "true"
  FITPUB_MAIL_FROM_ADDRESS: ""
  FITPUB_MAIL_FROM_NAME: "FitPub"

  # ---------------------------------------------------------------------------
  # File Uploads
  # ---------------------------------------------------------------------------
  FILE_UPLOAD_MAX_SIZE: "50MB"
  FILE_UPLOAD_DIR: "/app/uploads"
  FITPUB_PAGES_PATH: "/app/pages"

  # ---------------------------------------------------------------------------
  # User Registration
  # ---------------------------------------------------------------------------
  FITPUB_REGISTRATION_ENABLED: "true"

  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_ORG_OPERATON: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: "INFO"
  LOGGING_LEVEL_ORG_HIBERNATE: "WARN"
  LOGGING_LEVEL_ORG_FLYWAYDB: "INFO"
  FITPUB_LOG_DATE_PATTERN: "yyyy-MM-dd"
  FITPUB_LOG_MAX_FILE_SIZE: "100MB"
  FITPUB_LOG_MAX_HISTORY: "7"

applicationSecret:
  # Use an existing Secret with keys matching the environment variable names below.
  existingSecret: ""
  data:
    FITPUB_DATABASE_USERNAME: ""
    FITPUB_DATABASE_PASSWORD: ""
    FITPUB_JWT_SECRET: ""
    FITPUB_EMAIL_SECRET: ""
    FITPUB_REGISTRATION_PASSWORD: ""
    FITPUB_VAPID_PUBLIC_KEY: ""
    FITPUB_VAPID_PRIVATE_KEY: ""
    FITPUB_MAIL_USERNAME: ""
    FITPUB_MAIL_PASSWORD: ""

extraEnv: []
extraEnvFrom: []

productionChecks:
  # Keep disabled for chart linting and local rendering without real secrets.
  # Enable in production values to fail fast on missing required configuration.
  enabled: false

# =============================================================================
# Health Probes
# =============================================================================
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false
  ingress:
    enabled: true
    extraRules: []
  egress:
    # FitPub needs egress to PostgreSQL, SMTP and federated/external HTTP services.
    # Keep unrestricted unless your cluster has explicit egress policy requirements.
    allowAll: true
    extraRules: []

terminationGracePeriodSeconds: 60

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
volumes: []
volumeMounts: []
