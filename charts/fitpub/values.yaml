# =============================================================================
# Fitpub Helm Chart - Default Values
# =============================================================================

replicaCount: 1

revisionHistoryLimit: 10

# Minimum seconds a newly created pod must be ready before it counts as
# available. Only relevant when using RollingUpdate strategy.
minReadySeconds: 0

deploymentStrategy:
  type: Recreate

# Labels added to every resource created by this chart. Useful for cost
# allocation, environment tagging or platform-wide label policies.
commonLabels: {}
# commonLabels:
#   environment: production
#   team: platform

# Annotations added to every resource created by this chart.
commonAnnotations: {}
# commonAnnotations:
#   reloader.stakater.com/auto: "true"

# ---------------------------------------------------------------------------
# Diagnostic mode
# ---------------------------------------------------------------------------
# When enabled, overrides the container command with `sleep infinity` so you
# can exec into the pod and inspect the runtime environment without startup
# or probe failures interfering.
#
#   helm upgrade fitpub fitpub/fitpub \
#     --reuse-values \
#     --set diagnosticMode.enabled=true
#
diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity

image:
  # Container image for Fitpub
  repository: codeberg.org/fitpub/fitpub
  pullPolicy: IfNotPresent
  # Overrides the image tag (defaults to Chart appVersion)
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # FitPub does not call the Kubernetes API; disable token automount to reduce
  # the attack surface if the pod is ever compromised.
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # FitPub writes uploads, logs, temp files and caches. Enabling this requires
  # writable mounts for every write path used by the application and JVM.
  readOnlyRootFilesystem: false

initContainers:
  volumePermissions:
    enabled: true
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  annotations: {}
  labels: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fitpub.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 1536Mi
  limits:
    memory: 2048Mi

# =============================================================================
# Persistent Storage
# =============================================================================
persistence:
  enabled: true
  # Storage class for the uploads PVC.
  #   ""    — omit storageClassName; cluster uses its default StorageClass
  #   "-"   — set storageClassName: ""; disables dynamic provisioning, binds to
  #           a pre-existing PV without a StorageClass
  #   "x"   — use the named StorageClass explicitly
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  # Add helm.sh/resource-policy: keep to prevent the PVC (and your uploads)
  # from being deleted on `helm uninstall`.
  annotations: {}
  existingClaim: ""

pages:
  # Mount Markdown legal/about pages from an existing Secret.
  # The Secret should contain files such as terms.md, imprint.md and optional about.md.
  existingSecret: ""
  mountPath: /app/pages
  readOnly: true

# =============================================================================
# Application Configuration
# =============================================================================
# Non-secret values in this section are injected through a ConfigMap.
config:
  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  FITPUB_DATABASE_URL: ""
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"

  # ---------------------------------------------------------------------------
  # Application Settings
  # ---------------------------------------------------------------------------
  SPRING_PROFILES_ACTIVE: "prod"
  FITPUB_PORT: "8080"
  FITPUB_DOMAIN: ""
  FITPUB_BASE_URL: ""
  FITPUB_SITE_BANNER_TEXT: ""

  # ---------------------------------------------------------------------------
  # Security
  # ---------------------------------------------------------------------------
  FITPUB_JWT_EXPIRATION_MS: "86400000"
  FITPUB_ACTIVITYPUB_ENABLED: "true"

  # ---------------------------------------------------------------------------
  # Database Migrations (Flyway)
  # ---------------------------------------------------------------------------
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
  SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "true"

  # ---------------------------------------------------------------------------
  # Push Notifications (VAPID)
  # ---------------------------------------------------------------------------
  FITPUB_PUSH_ENABLED: "true"
  FITPUB_VAPID_SUBJECT: ""

  # ---------------------------------------------------------------------------
  # Email Settings
  # ---------------------------------------------------------------------------
  FITPUB_MAIL_HOST: ""
  FITPUB_MAIL_PORT: "587"
  FITPUB_MAIL_SMTP_AUTH: "true"
  FITPUB_MAIL_STARTTLS_ENABLE: "true"
  FITPUB_MAIL_STARTTLS_REQUIRED: "true"
  FITPUB_MAIL_FROM_ADDRESS: ""
  FITPUB_MAIL_FROM_NAME: "FitPub"

  # ---------------------------------------------------------------------------
  # File Uploads
  # ---------------------------------------------------------------------------
  FILE_UPLOAD_MAX_SIZE: "50MB"
  FILE_UPLOAD_DIR: "/app/uploads"
  FITPUB_PAGES_PATH: "/app/pages"

  # ---------------------------------------------------------------------------
  # User Registration
  # ---------------------------------------------------------------------------
  FITPUB_REGISTRATION_ENABLED: "true"

  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_ORG_OPERATON: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: "INFO"
  LOGGING_LEVEL_ORG_HIBERNATE: "WARN"
  LOGGING_LEVEL_ORG_FLYWAYDB: "INFO"
  FITPUB_LOG_DATE_PATTERN: "yyyy-MM-dd"
  FITPUB_LOG_MAX_FILE_SIZE: "100MB"
  FITPUB_LOG_MAX_HISTORY: "7"

applicationSecret:
  # Use an existing Secret with keys matching the environment variable names below.
  existingSecret: ""
  data:
    FITPUB_DATABASE_USERNAME: ""
    FITPUB_DATABASE_PASSWORD: ""
    FITPUB_JWT_SECRET: ""
    FITPUB_EMAIL_SECRET: ""
    FITPUB_REGISTRATION_PASSWORD: ""
    FITPUB_VAPID_PUBLIC_KEY: ""
    FITPUB_VAPID_PRIVATE_KEY: ""
    FITPUB_MAIL_USERNAME: ""
    FITPUB_MAIL_PASSWORD: ""

# Override the default container entrypoint. Useful for custom JVM flags or
# init wrapper scripts. Leave empty to use the image default.
command: []
# command:
#   - java

# Override the default container arguments. Leave empty to use image defaults.
args: []
# args:
#   - -XX:MaxRAMPercentage=75
#   - -jar
#   - /app/fitpub.jar

# Lifecycle hooks for the main container. The recommended preStop hook adds a
# small sleep so the load balancer can drain connections before SIGTERM.
lifecycleHooks: {}
# lifecycleHooks:
#   preStop:
#     exec:
#       command: ["sh", "-c", "sleep 5"]

extraEnv: []
extraEnvFrom: []
extraInitContainers: []
sidecars: []

productionChecks:
  # Keep disabled for chart linting and local rendering without real secrets.
  # Enable in production values to fail fast on missing required configuration.
  enabled: false

# =============================================================================
# Health Probes
# =============================================================================
# startupProbe gates both readiness and liveness: neither probe starts until
# startupProbe succeeds. Do not add initialDelaySeconds to readiness/liveness
# when startupProbe is defined — it only adds unnecessary extra delay on top.
#
# Spring Boot Actuator exposes fine-grained endpoints:
#   /actuator/health/liveness  — suitable for livenessProbe
#   /actuator/health/readiness — suitable for readinessProbe
# Override path here if your FitPub version exposes those endpoints and you
# want separate liveness vs. readiness semantics.
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /actuator/health
    port: http
  # Allow up to 15 + 12×10 = 135 s for JVM startup before declaring failure.
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  # No initialDelaySeconds: startupProbe already guards the startup window.
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  # FitPub is single-replica by default because uploads and background work need
  # explicit validation before running multiple pods.
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""

podDisruptionBudget:
  enabled: false
  # Use maxUnavailable for single-replica deployments to allow voluntary
  # evictions (node drain). minAvailable: 1 with replicaCount: 1 blocks all
  # drains and is an operational anti-pattern.
  # Exactly one of minAvailable or maxUnavailable must be set.
  minAvailable: ""
  maxUnavailable: 1

networkPolicy:
  # Disabled by default because FitPub needs egress to PostGIS, SMTP and
  # federated/external HTTP services. Enable only with rules matching your cluster.
  enabled: false
  ingress:
    enabled: true
    extraRules: []
  egress:
    # FitPub needs egress to PostgreSQL, SMTP and federated/external HTTP services.
    # Keep unrestricted unless your cluster has explicit egress policy requirements.
    allowAll: true
    extraRules: []

serviceMonitor:
  enabled: false
  labels: {}
  annotations: {}
  interval: 30s
  scrapeTimeout: 10s
  path: /actuator/prometheus
  scheme: http

terminationGracePeriodSeconds: 60

# Assign a PriorityClass to prevent the pod from being evicted under node
# resource pressure. Requires a PriorityClass resource to exist in the cluster.
priorityClassName: ""

# Use a non-default scheduler (e.g. a batch or GPU scheduler). Leave empty for
# the default Kubernetes scheduler.
schedulerName: ""

# Use a specific container runtime class (e.g. kata, gvisor) for sandboxed
# execution. Leave empty for the node default.
runtimeClassName: ""

# Add entries to the pod's /etc/hosts. Useful for local DNS overrides or
# testing federation with a self-hosted instance.
hostAliases: []
# hostAliases:
#   - ip: "192.168.1.10"
#     hostnames:
#       - "other-fitpub.internal"

# Override the pod's DNS policy. Valid values: ClusterFirst, ClusterFirstWithHostNet,
# Default, None. Leave empty for the cluster default (ClusterFirst).
dnsPolicy: ""

# Additional DNS configuration. Useful with dnsPolicy: None for custom resolvers.
dnsConfig: {}
# dnsConfig:
#   nameservers:
#     - 1.1.1.1
#   searches:
#     - ns1.svc.cluster.local

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
volumes: []
volumeMounts: []
