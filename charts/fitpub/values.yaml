# Default values for the fitpub chart.
# See README.md and docs/ for the longer explanations.

replicaCount: 1
revisionHistoryLimit: 10

# Only matters with the RollingUpdate strategy.
minReadySeconds: 0

# RWO PVC: old pod must release the volume before the new one mounts.
deploymentStrategy:
  type: Recreate

commonLabels: {}
#   environment: production
#   team: platform
commonAnnotations: {}
#   reloader.stakater.com/auto: "true"

# sleep infinity instead of the app — useful when you need to exec into a broken pod.
# helm upgrade ... --set diagnosticMode.enabled=true --reuse-values
diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity

image:
  repository: codeberg.org/fitpub/fitpub
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion when left empty.
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # FitPub does not call the API. No token needed.
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # /tmp and /app/logs are mounted as emptyDir below; /app/uploads is the PVC.
  readOnlyRootFilesystem: true

# emptyDir volumes for writable paths that would otherwise break readOnlyRootFilesystem.
# Mapped to /tmp (JVM scratch) and the log directory (logback file appender).
ephemeralVolumes:
  tmp:
    enabled: true
    sizeLimit: 256Mi
  logs:
    enabled: true
    sizeLimit: 512Mi
    mountPath: /app/logs

# Chowns the uploads PVC to the app user on first mount. Disabled by default:
# fsGroupChangePolicy: OnRootMismatch already handles this without root.
# Enable only for StorageClasses that ignore fsGroup (e.g. some NFS provisioners).
initContainers:
  volumePermissions:
    enabled: false
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  annotations: {}
  labels: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fitpub.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  # FitPub 1.1.x runs Java 25 with -XX:MaxRAMPercentage=75 against the cgroup
  # memory limit. Keep requests.memory close to limits.memory so the scheduler
  # reserves enough RAM for heap plus metaspace/native overhead. Lower values
  # only for throwaway clusters (see examples/development-values.yaml).
  requests:
    cpu: 250m
    memory: 3072Mi
  limits:
    memory: 3072Mi

persistence:
  enabled: true
  # "" -> default StorageClass, "-" -> no class (pre-bound PV), "name" -> that class.
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  # Set helm.sh/resource-policy: keep here to survive `helm uninstall`.
  annotations: {}
  existingClaim: ""
  # Must match config.FILE_UPLOAD_DIR (chart validates this).
  mountPath: /app/uploads

# Static Markdown pages (terms.md, imprint.md, optional about.md) from a Secret.
pages:
  existingSecret: ""
  mountPath: /app/pages
  readOnly: true

# Non-secret env, rendered into a ConfigMap and loaded via envFrom. Empty values
# are omitted so Spring Boot application defaults still apply (e.g. FITPUB_MAIL_HOST).
config:
  # Database
  FITPUB_DATABASE_URL: ""
  # Hikari pool tuning (application-prod.yml defaults apply when left empty).
  FITPUB_DB_MAX_POOL_SIZE: ""
  FITPUB_DB_MIN_IDLE: ""
  FITPUB_DB_CONNECTION_TIMEOUT: ""
  FITPUB_DB_IDLE_TIMEOUT: ""
  FITPUB_DB_MAX_LIFETIME: ""
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"

  # App
  SPRING_PROFILES_ACTIVE: "prod"
  FITPUB_PORT: "8080"
  FITPUB_DOMAIN: ""
  FITPUB_BASE_URL: ""
  FITPUB_SITE_BANNER_TEXT: ""

  # Security & federation
  FITPUB_SECURITY_JWT_EXPIRATION: ""
  # http is for local federation testing only.
  FITPUB_FEDERATION_PROTOCOL: "https"
  # true allows federation calls to private IPs (SSRF risk) - dev only.
  FITPUB_ALLOW_PRIVATE_IPS: "false"
  FITPUB_REMOTE_ACTIVITY_BACKFILL: ""
  FITPUB_ACTIVITYPUB_INBOX_PROCESSING_INTERVAL_MS: ""
  FITPUB_ACTIVITYPUB_INBOX_PROCESSING_TIMEOUT_SECONDS: ""
  FITPUB_ACTIVITYPUB_INBOX_BATCH_SIZE: ""
  FITPUB_ACTIVITYPUB_INBOX_RETRY_DELAY_SECONDS: ""
  FITPUB_ACTIVITYPUB_INBOX_MAX_ATTEMPTS: ""

  # Flyway
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
  SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "true"

  # Web push requires VAPID keys in applicationSecret and an operator contact subject.
  FITPUB_PUSH_ENABLED: "false"
  FITPUB_VAPID_SUBJECT: ""

  # Mail — leave empty until FITPUB_MAIL_HOST is set; otherwise Spring Boot defaults
  # apply (localhost:25 without auth). Set port/auth/starttls together with the host.
  FITPUB_MAIL_HOST: ""
  FITPUB_MAIL_PORT: ""
  FITPUB_MAIL_PROTOCOL: ""
  FITPUB_MAIL_SMTP_AUTH: ""
  FITPUB_MAIL_STARTTLS_ENABLE: ""
  FITPUB_MAIL_STARTTLS_REQUIRED: ""
  FITPUB_MAIL_FROM_ADDRESS: ""
  FITPUB_MAIL_FROM_NAME: ""

  # Uploads - standard Spring multipart limits, keep request >= file.
  SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: "50MB"
  SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: "50MB"
  FILE_UPLOAD_DIR: "/app/uploads"
  FITPUB_PAGES_PATH: "/app/pages"

  FITPUB_REGISTRATION_ENABLED: "true"

  # Feature toggles (application defaults apply when left empty).
  FITPUB_OSM_TILES_ENABLED: ""
  FITPUB_WEATHER_ENABLED: ""

  # Logging overrides the prod Spring profile defaults (root WARN in the app).
  # Tune here for platform visibility; remove keys to fall back to profile defaults.
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_NET_JAVAHIPPIE_FITPUB: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: "INFO"
  LOGGING_LEVEL_ORG_HIBERNATE: "WARN"
  LOGGING_LEVEL_ORG_FLYWAYDB: "INFO"
  FITPUB_LOG_DATE_PATTERN: "yyyy-MM-dd"
  FITPUB_LOG_MAX_FILE_SIZE: "100MB"
  FITPUB_LOG_MAX_HISTORY: "7"

# Either point existingSecret at a pre-created Secret, or fill in data below.
applicationSecret:
  existingSecret: ""
  data:
    FITPUB_DATABASE_USERNAME: ""
    FITPUB_DATABASE_PASSWORD: ""
    FITPUB_JWT_SECRET: ""
    FITPUB_EMAIL_SECRET: ""
    FITPUB_REGISTRATION_PASSWORD: ""
    FITPUB_VAPID_PUBLIC_KEY: ""
    FITPUB_VAPID_PRIVATE_KEY: ""
    FITPUB_MAIL_USERNAME: ""
    FITPUB_MAIL_PASSWORD: ""

# Override entrypoint/args only if you know why (e.g. custom JVM flags).
command: []
args: []

# preStop sleep gives the LB time to drain before SIGTERM, etc.
lifecycleHooks: {}
#   preStop:
#     exec:
#       command: ["sh", "-c", "sleep 5"]

extraEnv: []
extraEnvFrom: []
extraInitContainers: []
sidecars: []

# Fail at install time if required prod settings are missing. Off by default for helm lint/template.
productionChecks:
  enabled: false

# FitPub 1.1.x blocks unauthenticated /actuator/health/** (302/403). Probes use /login
# (permitAll, HTTP 200) until the app image permits actuator health. See docs/troubleshooting.md.
readinessProbe:
  httpGet:
    path: /login
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /login
    port: http
  # ~195s budget for startup (15 + 18*10) — Flyway + JVM on small nodes.
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 18

livenessProbe:
  httpGet:
    path: /login
    port: http
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

# Multi-pod not tested yet — see docs/design.md.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""

podDisruptionBudget:
  enabled: false
  # maxUnavailable:1 for single replica; minAvailable:1 blocks node drains. Pick one.
  minAvailable: ""
  maxUnavailable: 1

# Off by default: FitPub needs egress to PostGIS, SMTP and federated hosts.
# Do not set ingress.enabled=false without ingress.extraRules — that denies all
# inbound traffic when networkPolicy.enabled=true.
networkPolicy:
  enabled: false
  ingress:
    enabled: true
    extraRules: []
  egress:
    allowAll: true
    extraRules: []

serviceMonitor:
  enabled: false
  labels: {}
  annotations: {}
  interval: 30s
  scrapeTimeout: 10s
  # Exposed in the prod profile. FitPub 1.1.x requires authentication for all
  # actuator endpoints, so Prometheus receives 302/403 unless the app image
  # permits unauthenticated actuator access or you add scrape auth / a sidecar.
  # /actuator/prometheus is not available unless micrometer-registry-prometheus
  # is added to the app image.
  path: /actuator/metrics
  scheme: http

terminationGracePeriodSeconds: 60

priorityClassName: ""
schedulerName: ""
runtimeClassName: ""

hostAliases: []
#   - ip: "192.168.1.10"
#     hostnames:
#       - "other-fitpub.internal"

# ClusterFirst | ClusterFirstWithHostNet | Default | None ("" = cluster default).
dnsPolicy: ""
dnsConfig: {}
#   nameservers:
#     - 1.1.1.1

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
volumes: []
volumeMounts: []
