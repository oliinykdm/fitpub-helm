{{- if not .Values.applicationSecret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fitpub.secretName" . }}
  labels:
    {{- include "fitpub.labels" . | nindent 4 }}
  {{- with (include "fitpub.metaAnnotations" (dict "annotations" (dict) "context" $)) }}
  {{- . | nindent 2 }}
  {{- end }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.applicationSecret.data }}
  {{- if not (kindIs "invalid" $value) }}
  {{- if ne ($value | toString) "" }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
