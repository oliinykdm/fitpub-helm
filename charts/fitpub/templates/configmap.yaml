apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fitpub.configMapName" . }}
  labels:
    {{- include "fitpub.labels" . | nindent 4 }}
  {{- $ann := include "fitpub.annotations" (dict "annotations" (dict) "context" $) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
