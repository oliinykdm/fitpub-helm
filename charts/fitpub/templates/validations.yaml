{{- if and (eq (.Values.dnsPolicy | default "") "None") (not .Values.dnsConfig.nameservers) -}}
{{- fail "dnsPolicy: None requires dnsConfig.nameservers; Kubernetes rejects pods with dnsPolicy=None and no nameservers configured" -}}
{{- end -}}

{{- if and .Values.config.FITPUB_BASE_URL (regexMatch "/$" .Values.config.FITPUB_BASE_URL) -}}
{{- fail "config.FITPUB_BASE_URL must not end with a slash; trailing slash breaks generated ActivityPub/WebFinger URLs" -}}
{{- end -}}

{{- if and .Values.config.FITPUB_DOMAIN (regexMatch "://|/" (.Values.config.FITPUB_DOMAIN | toString)) -}}
{{- fail (printf "config.FITPUB_DOMAIN (%s) must be a bare host with optional port, not a URL; remove the scheme and any trailing slash, e.g. \"example.fit\" not \"https://example.fit/\"" .Values.config.FITPUB_DOMAIN) -}}
{{- end -}}

{{- if and .Values.config.FITPUB_FEDERATION_PROTOCOL (not (has (.Values.config.FITPUB_FEDERATION_PROTOCOL | toString) (list "http" "https"))) -}}
{{- fail (printf "config.FITPUB_FEDERATION_PROTOCOL (%s) must be either \"http\" or \"https\"" .Values.config.FITPUB_FEDERATION_PROTOCOL) -}}
{{- end -}}

{{- if and .Values.config.FITPUB_PORT (ne (.Values.config.FITPUB_PORT | toString) (.Values.service.port | toString)) -}}
{{- fail (printf "config.FITPUB_PORT (%v) must match service.port (%v); the app listens on FITPUB_PORT but health probes and the Service use service.port" .Values.config.FITPUB_PORT .Values.service.port) -}}
{{- end -}}

{{- if and .Values.persistence.enabled .Values.config.FILE_UPLOAD_DIR (ne .Values.config.FILE_UPLOAD_DIR .Values.persistence.mountPath) -}}
{{- fail (printf "config.FILE_UPLOAD_DIR (%s) must match persistence.mountPath (%s); a mismatch causes uploads to be written to ephemeral storage and lost on pod restart" .Values.config.FILE_UPLOAD_DIR .Values.persistence.mountPath) -}}
{{- end -}}

{{- if and .Values.pages.existingSecret .Values.config.FITPUB_PAGES_PATH (ne .Values.config.FITPUB_PAGES_PATH .Values.pages.mountPath) -}}
{{- fail (printf "config.FITPUB_PAGES_PATH (%s) must match pages.mountPath (%s); a mismatch means the app looks for Markdown pages in the wrong directory" .Values.config.FITPUB_PAGES_PATH .Values.pages.mountPath) -}}
{{- end -}}

{{- if and .Values.config.FITPUB_DATABASE_URL (not (hasPrefix "jdbc:postgresql:" (.Values.config.FITPUB_DATABASE_URL | toString))) -}}
{{- fail (printf "config.FITPUB_DATABASE_URL (%s) must be a JDBC PostgreSQL URL, e.g. jdbc:postgresql://host:5432/fitpub. FitPub also needs the PostGIS extension enabled on that database." .Values.config.FITPUB_DATABASE_URL) -}}
{{- end -}}

{{- if and .Values.autoscaling.enabled (not .Values.autoscaling.targetCPUUtilizationPercentage) (not .Values.autoscaling.targetMemoryUtilizationPercentage) -}}
{{- fail "autoscaling: at least one of targetCPUUtilizationPercentage or targetMemoryUtilizationPercentage must be set when autoscaling.enabled=true; the HPA metrics list would be empty" -}}
{{- end -}}

{{- /*
Running more than one pod against a ReadWriteOnce upload volume cannot work: the
second pod fails to mount. Block the obvious footguns (replicaCount>1 or an HPA
that can scale past 1) unless the volume is shared or an external claim is used.
*/ -}}
{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) (eq .Values.persistence.accessMode "ReadWriteOnce") -}}
{{- $wantsMulti := or (gt (int .Values.replicaCount) 1) (and .Values.autoscaling.enabled (gt (int .Values.autoscaling.maxReplicas) 1)) -}}
{{- if $wantsMulti -}}
{{- fail "Multiple pods cannot share a ReadWriteOnce upload volume; set persistence.accessMode=ReadWriteMany (with a supporting StorageClass) or persistence.existingClaim, or keep replicaCount=1 with autoscaling.maxReplicas<=1" -}}
{{- end -}}
{{- end -}}

{{- if and .Values.serviceMonitor.enabled -}}
{{- $interval := .Values.serviceMonitor.interval | toString | trimSuffix "s" | int -}}
{{- $timeout := .Values.serviceMonitor.scrapeTimeout | toString | trimSuffix "s" | int -}}
{{- if and (gt $interval 0) (gt $timeout 0) (ge $timeout $interval) -}}
{{- fail (printf "serviceMonitor.scrapeTimeout (%s) must be less than serviceMonitor.interval (%s)" .Values.serviceMonitor.scrapeTimeout .Values.serviceMonitor.interval) -}}
{{- end -}}
{{- end -}}

{{- if .Values.productionChecks.enabled -}}
{{- $requiredConfig := list "FITPUB_DATABASE_URL" "FITPUB_DOMAIN" "FITPUB_BASE_URL" -}}
{{- range $key := $requiredConfig -}}
{{- if not (index $.Values.config $key) -}}
{{- fail (printf "config.%s is required when productionChecks.enabled=true" $key) -}}
{{- end -}}
{{- end -}}

{{- if not .Values.applicationSecret.existingSecret -}}
{{- $requiredSecrets := list "FITPUB_DATABASE_USERNAME" "FITPUB_DATABASE_PASSWORD" "FITPUB_JWT_SECRET" "FITPUB_EMAIL_SECRET" -}}
{{- range $key := $requiredSecrets -}}
{{- if not (index $.Values.applicationSecret.data $key) -}}
{{- fail (printf "applicationSecret.data.%s is required when productionChecks.enabled=true" $key) -}}
{{- end -}}
{{- end -}}
{{- end -}}

{{- if eq (index $.Values.config "FITPUB_PUSH_ENABLED" | default "false" | toString) "true" -}}
{{- if not (index $.Values.config "FITPUB_VAPID_SUBJECT") -}}
{{- fail "config.FITPUB_PUSH_ENABLED is true but config.FITPUB_VAPID_SUBJECT is not set; provide an operator contact URI such as mailto:admin@example.com or disable push with config.FITPUB_PUSH_ENABLED=false" -}}
{{- end -}}
{{- if not $.Values.applicationSecret.existingSecret -}}
{{- $requiredVapidSecrets := list "FITPUB_VAPID_PUBLIC_KEY" "FITPUB_VAPID_PRIVATE_KEY" -}}
{{- range $key := $requiredVapidSecrets -}}
{{- if not (index $.Values.applicationSecret.data $key) -}}
{{- fail (printf "config.FITPUB_PUSH_ENABLED is true but applicationSecret.data.%s is not set; provide VAPID keys or disable push with config.FITPUB_PUSH_ENABLED=false" $key) -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}

{{/*
Secret sanity checks that mirror the application's own startup validation, so a
weak or placeholder secret fails at `helm install` time with a clear message
instead of a pod CrashLoopBackOff. Only runs for inline secrets.
*/}}
{{- if not .Values.applicationSecret.existingSecret -}}
{{- $placeholders := list "changeme" "change-this-secret-key-in-production-must-be-at-least-32-characters-long" "change-this-email-secret-in-production-must-be-at-least-32-characters-long" -}}
{{- $jwt := .Values.applicationSecret.data.FITPUB_JWT_SECRET | default "" | toString -}}
{{- if $jwt -}}
{{- if lt (len $jwt) 32 -}}
{{- fail (printf "applicationSecret.data.FITPUB_JWT_SECRET is %d characters; FitPub requires at least 32 (HS256 needs a 256-bit key). Generate one with: openssl rand -base64 48" (len $jwt)) -}}
{{- end -}}
{{- if has $jwt $placeholders -}}
{{- fail "applicationSecret.data.FITPUB_JWT_SECRET is a known placeholder value; the application refuses to start with it. Generate a real one with: openssl rand -base64 48" -}}
{{- end -}}
{{- end -}}
{{- $email := .Values.applicationSecret.data.FITPUB_EMAIL_SECRET | default "" | toString -}}
{{- if $email -}}
{{- if lt (len $email) 32 -}}
{{- fail (printf "applicationSecret.data.FITPUB_EMAIL_SECRET is %d characters; FitPub requires at least 32. Generate one with: openssl rand -base64 48" (len $email)) -}}
{{- end -}}
{{- if has $email $placeholders -}}
{{- fail "applicationSecret.data.FITPUB_EMAIL_SECRET is a known placeholder value; the application refuses to start with it. Generate a real one with: openssl rand -base64 48" -}}
{{- end -}}
{{- end -}}
{{- end -}}
