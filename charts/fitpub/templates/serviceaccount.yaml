{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fitpub.serviceAccountName" . }}
  labels:
    {{- include "fitpub.labels" . | nindent 4 }}
  {{- with (include "fitpub.metaAnnotations" (dict "annotations" .Values.serviceAccount.annotations "context" $)) }}
  {{- . | nindent 2 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
