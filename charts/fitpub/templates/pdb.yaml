{{- if .Values.podDisruptionBudget.enabled }}
{{- $minAvail := .Values.podDisruptionBudget.minAvailable | toString }}
{{- $maxUnavail := .Values.podDisruptionBudget.maxUnavailable | toString }}
{{- /*
maxUnavailable wins when both are set. Helm merges values rather than replacing
them, so the default minAvailable:1 would otherwise collide with a user that only
sets maxUnavailable. Precedence keeps the override clean without nulling minAvailable.
*/}}
{{- if and (eq $minAvail "") (eq $maxUnavail "") }}
{{- fail "podDisruptionBudget: one of minAvailable or maxUnavailable must be set" }}
{{- end }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "fitpub.fullname" . }}
  labels:
    {{- include "fitpub.labels" . | nindent 4 }}
  {{- with (include "fitpub.metaAnnotations" (dict "annotations" (dict) "context" $)) }}
  {{- . | nindent 2 }}
  {{- end }}
spec:
  {{- if ne $maxUnavail "" }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- else }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fitpub.selectorLabels" . | nindent 6 }}
{{- end }}
