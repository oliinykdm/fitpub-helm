apiVersion: v1
kind: Service
metadata:
  name: {{ include "fitpub.fullname" . }}
  labels:
    {{- include "fitpub.labels" . | nindent 4 }}
    {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with (include "fitpub.metaAnnotations" (dict "annotations" .Values.service.annotations "context" $)) }}
  {{- . | nindent 2 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      appProtocol: http
  selector:
    {{- include "fitpub.selectorLabels" . | nindent 4 }}
