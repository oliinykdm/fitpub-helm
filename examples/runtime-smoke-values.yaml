# Values used by the runtime smoke-test workflow.
# This is intentionally not a production example.

productionChecks:
  enabled: true

image:
  tag: "1.1.1"

config:
  FITPUB_DATABASE_URL: "jdbc:postgresql://postgis:5432/fitpub"
  FITPUB_DOMAIN: "fitpub.local"
  FITPUB_BASE_URL: "http://fitpub.local"
  FITPUB_FEDERATION_PROTOCOL: "http"
  FITPUB_PUSH_ENABLED: "false"

applicationSecret:
  existingSecret: "fitpub-secret"

ingress:
  enabled: false

persistence:
  enabled: false

podDisruptionBudget:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 1536Mi
  limits:
    memory: 1536Mi

extraEnv:
  - name: JAVA_TOOL_OPTIONS
    value: "-XX:MaxRAMPercentage=60"
