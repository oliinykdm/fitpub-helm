# Example production values for FitPub with an external PostGIS database.
#
# Create the Secret separately with keys matching applicationSecret.data:
# kubectl create secret generic fitpub-secret \
#   --from-literal=FITPUB_DATABASE_USERNAME=fitpub \
#   --from-literal=FITPUB_DATABASE_PASSWORD="$(openssl rand -base64 32)" \
#   --from-literal=FITPUB_JWT_SECRET="$(openssl rand -base64 64)" \
#   --from-literal=FITPUB_EMAIL_SECRET="$(openssl rand -base64 64)" \
#   --from-literal=FITPUB_MAIL_USERNAME="smtp-user" \
#   --from-literal=FITPUB_MAIL_PASSWORD="smtp-password"
# (mail user/password are needed because this example sets FITPUB_MAIL_SMTP_AUTH=true)

productionChecks:
  enabled: true

image:
  tag: "1.1.1"

config:
  FITPUB_DATABASE_URL: "jdbc:postgresql://postgres.example.com:5432/fitpub"
  FITPUB_DOMAIN: "fitpub.example.com"
  # Important: no trailing slash. A trailing slash produces broken ActivityPub URLs.
  FITPUB_BASE_URL: "https://fitpub.example.com"
  FITPUB_PUSH_ENABLED: "false"
  FITPUB_MAIL_HOST: "smtp.example.com"
  FITPUB_MAIL_PORT: "587"
  FITPUB_MAIL_PROTOCOL: "smtp"
  FITPUB_MAIL_SMTP_AUTH: "true"
  FITPUB_MAIL_STARTTLS_ENABLE: "true"
  FITPUB_MAIL_STARTTLS_REQUIRED: "true"
  FITPUB_MAIL_FROM_ADDRESS: "admin@example.com"
  FITPUB_MAIL_FROM_NAME: "FitPub"

applicationSecret:
  existingSecret: "fitpub-secret"

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: fitpub.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fitpub-tls
      hosts:
        - fitpub.example.com

persistence:
  enabled: true
  size: 10Gi

# Optional: mount legal/about Markdown pages from an existing Secret.
# kubectl create secret generic fitpub-pages --from-file=terms.md --from-file=imprint.md --from-file=about.md
pages:
  existingSecret: ""

# maxUnavailable: 1 allows voluntary evictions (node drain) for a single-replica
# deployment. Using minAvailable: 1 with replicaCount: 1 would block all drains.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
