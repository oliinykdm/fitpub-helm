# Example values for controlled testing where Helm manages the application Secret.
#
# For production, prefer examples/production-values.yaml with applicationSecret.existingSecret.

productionChecks:
  enabled: true

config:
  FITPUB_DATABASE_URL: "jdbc:postgresql://postgres.example.com:5432/fitpub"
  FITPUB_DOMAIN: "fitpub.example.com"
  FITPUB_BASE_URL: "https://fitpub.example.com"
  FITPUB_PUSH_ENABLED: "false"

applicationSecret:
  data:
    FITPUB_DATABASE_USERNAME: "fitpub"
    FITPUB_DATABASE_PASSWORD: "replace-me"
    FITPUB_JWT_SECRET: "replace-me-with-a-long-random-secret"
    FITPUB_EMAIL_SECRET: "replace-me-with-a-long-random-secret"

ingress:
  enabled: false
