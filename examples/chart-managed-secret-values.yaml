# Example values for controlled testing where Helm manages the application Secret.
#
# For production, prefer examples/production-values.yaml with applicationSecret.existingSecret.
# Generate real secrets before enabling productionChecks:
#   openssl rand -base64 24   # FITPUB_DATABASE_PASSWORD
#   openssl rand -base64 48   # FITPUB_JWT_SECRET / FITPUB_EMAIL_SECRET

productionChecks:
  enabled: true

config:
  FITPUB_DATABASE_URL: "jdbc:postgresql://postgres.example.com:5432/fitpub"
  FITPUB_DOMAIN: "fitpub.example.com"
  FITPUB_BASE_URL: "https://fitpub.example.com"
  FITPUB_PUSH_ENABLED: "false"

applicationSecret:
  data:
    FITPUB_DATABASE_USERNAME: "fitpub"
    FITPUB_DATABASE_PASSWORD: "controlled-testing-db-password"
    FITPUB_JWT_SECRET: "controlled-testing-jwt-secret-with-more-than-32-characters"
    FITPUB_EMAIL_SECRET: "controlled-testing-email-secret-with-more-than-32-characters"

ingress:
  enabled: false
